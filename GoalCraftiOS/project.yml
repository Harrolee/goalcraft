name: GoalCraftiOS
options:
  bundleIdPrefix: com.btyt
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
packages:
  Auth0:
    url: https://github.com/auth0/Auth0.swift
    from: 2.10.0
targets:
  GoalCraftiOS:
    type: application
    platform: iOS
    sources:
      - GoalCraftiOS
    dependencies:
      - package: Auth0
        product: Auth0
    info:
      path: GoalCraftiOS/Info.plist
      properties:
        CFBundleDisplayName: Screen Test
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          # Dev only: allow http to the local backend. Tighten before release.
          NSAllowsLocalNetworking: true
        CFBundleURLTypes:
          # Custom-scheme callback for Auth0 WebAuth (matches the bundle id).
          - CFBundleURLSchemes:
              - $(PRODUCT_BUNDLE_IDENTIFIER)
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.btyt.screentest
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
