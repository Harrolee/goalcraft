# GitHub Actions workflow for deploying GoalCraft frontend to GitHub Pages
#
# This workflow:
# 1. Triggers on push to main branch when frontend files change
# 2. Builds the Flutter web application
# 3. Deploys to GitHub Pages
#
# Required GitHub Secrets:
#   API_BASE_URL - Backend API URL (e.g., https://goalcraft-backend-xxxxx.run.app)
#
# Setup Instructions:
# 1. Enable GitHub Pages in repo settings (Settings -> Pages -> Source: GitHub Actions)
# 2. Add the API_BASE_URL secret

name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:  # Allow manual trigger

env:
  FLUTTER_VERSION: '3.27.0'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Analyze code
        working-directory: frontend
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Run tests
        working-directory: frontend
        run: flutter test
        continue-on-error: true

      - name: Build Flutter Web
        working-directory: frontend
        run: |
          flutter build web --release \
            --base-href "/goalcraft/" \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}

      - name: Verify build output
        working-directory: frontend
        run: |
          if [ ! -d "build/web" ]; then
            echo "Build failed: build/web directory not found"
            exit 1
          fi
          echo "Build contents:"
          ls -la build/web/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build/web

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Summary
        run: |
          echo "Frontend deployed to GitHub Pages!"
          echo "Production URL: https://harrolee.github.io/goalcraft/"
